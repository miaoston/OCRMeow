name: OCRMeow Industrial Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Fonts (for OCR Test)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei

      - name: Install Puppeteer Browsers
        run: npx puppeteer browsers install chrome

      - name: Run code checks (lint, format, type-check)
        run: npm run check

      - name: "[LEAN] Run Build"
        run: npm run build

      - name: "[LEAN] Run OCR Easter Egg Test"
        run: node tests/run_ocr_test.js

      - name: "[LEAN] Package Extension"
        run: |
          cd dist
          zip -r ../ocrmeow-lean.zip .
          cd ..

      - name: "[BUNDLED] Download Models"
        run: |
          mkdir -p public/models
          curl -L "https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_det_onnx.tar" -o public/models/det.tar
          curl -L "https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_rec_onnx.tar" -o public/models/rec.tar

      - name: "[BUNDLED] Run Build"
        run: npm run build

      - name: "[BUNDLED] Package Extension"
        run: |
          cd dist
          zip -r ../ocrmeow-bundled.zip .
          cd ..

      - name: Upload Extension ZIPs (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: ocrmeow-extensions
          path: |
            ocrmeow-lean.zip
            ocrmeow-bundled.zip
          retention-days: 14

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
